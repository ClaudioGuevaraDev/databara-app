name: Release

# Builds installers for macOS, Linux and Windows and publishes them to a
# GitHub Release. Triggered by pushing a version tag, e.g.:
#   git tag v0.10.1 && git push origin v0.10.1
#
# The release is created ONCE up front (create-release) so every matrix build
# uploads its assets to the same draft via a shared releaseId, then a final job
# flips the draft to published. Letting each matrix job create its own release
# (the old single-job layout) races on GitHub's API and scatters the per-OS
# bundles across duplicate drafts — which is how the Linux .AppImage/.deb/.rpm
# went missing from a release while macOS and Windows showed up.
on:
  push:
    tags:
      - "v*"

jobs:
  # 1. Create the draft release once and hand its id to the build matrix.
  create-release:
    permissions:
      contents: write # required to create the GitHub Release
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              body: 'Descarga el instalador para tu sistema operativo en los assets de abajo.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # 2. Build every platform and upload bundles into the shared draft.
  build-tauri:
    needs: create-release
    permissions:
      contents: write # required to upload assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary so a single .dmg runs on both Intel and Apple Silicon.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 system dependencies (WebKitGTK, AppIndicator, rsvg) plus the
      # OpenSSL headers this project needs through native-tls / postgres-native-tls.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS needs both arches to assemble the universal binary.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Updater signing (required for in-app auto-update) ---
          # Generated once with `pnpm tauri signer generate`; the public key lives in
          # tauri.conf.json (plugins.updater.pubkey). With these set, tauri-action signs
          # the bundles and generates/uploads `latest.json` to the release automatically.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- Code signing (NOT configured yet — unsigned builds for now) ---
          # macOS notarization (requires Apple Developer Program, 99 USD/yr):
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (requires a code-signing certificate):
          #   TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # 3. All bundles uploaded — flip the draft to a published release.
  publish-release:
    needs: [create-release, build-tauri]
    permissions:
      contents: write # required to update the GitHub Release
    runs-on: ubuntu-22.04
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });
